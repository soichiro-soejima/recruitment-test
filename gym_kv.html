<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY MAKE GYM</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0d0d0d; overflow: hidden; }

    .hero {
      position: relative;
      width: 1200px; height: 600px;
      background: #0d0d0d;
      overflow: hidden;
    }

    /* ===== 斜め画像エリア ===== */
    .img-panel {
      position: absolute;
      top: 0; right: -60px;
      width: 620px; height: 600px;
      transform: skewX(-8deg);
      overflow: hidden;
      z-index: 1;
    }
    .img-panel::before {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to right, #0d0d0d 0%, transparent 20%);
    }
    .img-panel img {
      position: absolute;
      top: 0; left: -20px;
      width: 700px; height: 600px;
      object-fit: cover;
      object-position: center top;
      transform: skewX(8deg);
    }

    /* ===== 左コンテンツ ===== */
    .hero-content {
      position: relative; z-index: 5;
      padding: 70px 0 0 56px;
      width: 520px;
    }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 0.78rem;
      letter-spacing: 0.22em; color: #fff;
      margin-bottom: 2.5rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 14px; height: 14px; fill: #111; }

    .hero-title {
      font-size: 2.6rem; font-weight: 900;
      color: #fff; line-height: 1.35;
      margin-bottom: 1rem; letter-spacing: -0.01em;
    }
    .hero-sub {
      font-size: 0.8rem; color: rgba(255,255,255,0.5);
      line-height: 1.9; margin-bottom: 2rem;
      font-weight: 400;
    }

    .badges {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 2rem;
    }
    .bdg {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); font-size: 0.62rem;
      padding: 0.3rem 0.75rem; border-radius: 2px;
      letter-spacing: 0.04em; white-space: nowrap;
    }

    .btn-subtle {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.3);
      background: transparent;
      padding: 0.7rem 1.75rem; border-radius: 2px;
      font-size: 0.75rem; text-decoration: none;
      letter-spacing: 0.08em;
    }

    .bottom-bar {
      position: absolute; bottom: 0; left: 0;
      width: 460px; z-index: 5;
      display: flex; border-top: 1px solid rgba(255,255,255,0.08);
    }
    .b-item {
      flex: 1; padding: 1rem 1.25rem;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .b-item:last-child { border-right: none; }
    .b-label {
      font-size: 0.58rem; color: rgba(255,255,255,0.35);
      margin-bottom: 0.2rem; letter-spacing: 0.06em;
    }
    .b-val {
      font-size: 0.9rem; font-weight: 700; color: #fff;
      letter-spacing: -0.01em;
    }
    .b-val span { font-size: 0.62rem; font-weight: 400; color: rgba(255,255,255,0.45); margin-left: 0.2rem; }
  </style>
</head>
<body>
<div class="hero">

  <!-- 斜め画像パネル -->
  <div class="img-panel">
    <img src="trainer.png" alt="gym">
  </div>
  <!-- 左コンテンツ -->
  <div class="hero-content">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16"><path d="M8 2C4.686 2 2 4.686 2 8s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6zm0 10.5A4.5 4.5 0 1 1 8 3.5a4.5 4.5 0 0 1 0 9z"/></svg>
      </div>
      BODY MAKE GYM
    </div>

    <!-- 欠陥①: キャッチコピーが機能だけ訴求 -->
    <div class="hero-title">完全個室で<br>マンツーマン指導</div>

    <!-- 欠陥②: ターゲット不明確 -->
    <div class="hero-sub">
      プロトレーナーによる科学的アプローチで、<br>
      あなたの身体づくりを全力でサポートします。
    </div>

    <!-- 欠陥④: 情報過多 -->
    <div class="badges">
      <span class="bdg">完全個室</span>
      <span class="bdg">マンツーマン指導</span>
      <span class="bdg">食事管理サポート</span>
      <span class="bdg">最新マシン完備</span>
      <span class="bdg">月額9,800円〜</span>
      <span class="bdg">駅徒歩3分</span>
      <span class="bdg">無料体験あり</span>
    </div>

    <!-- 欠陥③: CTAが目立たない -->
    <a href="#" class="btn-subtle">無料体験を予約する</a>
  </div>

  <!-- 下部バー -->
  <div class="bottom-bar">
    <div class="b-item">
      <div class="b-label">月額料金</div>
      <div class="b-val">¥9,800<span>〜</span></div>
    </div>
    <div class="b-item">
      <div class="b-label">累計会員数</div>
      <div class="b-val">500<span>名以上</span></div>
    </div>
    <div class="b-item">
      <div class="b-label">顧客満足度</div>
      <div class="b-val">98<span>%</span></div>
    </div>
  </div>

</div>
</body>
</html>
