<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY MAKE GYM</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0d0d0d; overflow: hidden; }

    .hero {
      position: relative;
      width: 1200px; height: 600px;
      background: #0d0d0d;
      overflow: hidden;
    }

    /* ===== 斜め画像エリア ===== */
    .img-panel {
      position: absolute;
      top: 0; right: 0;
      width: 680px; height: 600px;
      clip-path: polygon(14% 0%, 100% 0%, 100% 100%, 0% 100%);
      overflow: hidden;
      z-index: 1;
    }
    .img-panel img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ===== 左コンテンツ ===== */
    .hero-content {
      position: relative; z-index: 5;
      padding: 52px 0 48px 56px;
      width: 520px;
      height: 600px;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 0.78rem;
      letter-spacing: 0.22em; color: #fff;
      margin-bottom: 2.5rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 1rem;
      letter-spacing: 0.2em;
      background: linear-gradient(90deg, #c8a84b 0%, #f0d878 50%, #c8a84b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7rem; line-height: 0.9;
      color: #fff; letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    .hero-title .dim { color: rgba(255,255,255,0.18); }
    .hero-sub {
      font-size: 0.95rem; font-weight: 700; color: #fff;
      line-height: 1.7; margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }
    .hero-desc {
      font-size: 0.75rem; color: rgba(255,255,255,0.45);
      line-height: 1.9; margin-bottom: 0;
    }

    .badges {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 2rem;
    }
    .bdg {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); font-size: 0.62rem;
      padding: 0.3rem 0.75rem; border-radius: 2px;
      letter-spacing: 0.04em; white-space: nowrap;
    }

    .btn-subtle {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.3);
      background: transparent;
      padding: 0.7rem 1.75rem; border-radius: 2px;
      font-size: 0.75rem; text-decoration: none;
      letter-spacing: 0.08em;
    }

  </style>
</head>
<body>
<div class="hero">

  <!-- 斜め画像パネル -->
  <div class="img-panel">
    <img src="trainer.png" alt="gym">
  </div>
  <!-- 左コンテンツ -->
  <div class="hero-content">
    <div class="logo">BODY MAKE GYM</div>

    <!-- 欠陥①: キャッチコピーが機能だけ訴求 -->
    <div class="hero-title">TRAIN<br><span class="dim">HARD</span></div>

    <!-- 欠陥②: ターゲット不明確 -->
    <div class="hero-sub">完全個室 · マンツーマン指導 · 最新マシン完備</div>
    <div class="hero-desc">
      プロトレーナーによる科学的アプローチで、<br>
      あなたの身体づくりを全力でサポートします。
    </div>


    <!-- 欠陥③: CTAが目立たない -->
    <a href="#" class="btn-subtle">無料体験を予約する</a>
  </div>


</div>
</body>
</html>
